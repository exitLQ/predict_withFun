name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, cookies, personal data, or private provider output.
        Report vulnerabilities privately using SECURITY.md.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Start the application with…
        2. Open…
        3. Select…
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: Commit SHA or deployment date
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows/Linux/macOS, Python, browser, deployment platform
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove credentials, URLs containing secrets, user data, and provider content.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I searched existing issues.
          required: true
        - label: This report contains no secrets or personal data.
          required: true
        - label: This is not a private security report.
          required: true

services:
  - type: web
    name: predict-with-fun
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6-sol
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-4.5
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-5
      - key: ANALYSIS_CACHE_TTL
        value: 1800
      - key: PROVIDER_FALLBACK
        value: true
